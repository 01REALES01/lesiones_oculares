# Prototipo desplegable: backend API + frontend web
# Uso: docker-compose up --build
# Frontend: http://localhost:80  (API en /api/*)

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - PYTHONPATH=/app
    volumes:
      - ./data:/app/data

  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
